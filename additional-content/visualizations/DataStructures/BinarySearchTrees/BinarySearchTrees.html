<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binary Search Tree Visualiser</title>
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="../DataStructs.css" />
  <style>
    /* ── Page layout ── */
    body {
      display: flex;
      flex-direction: column;
      width: 100vw;
      min-height: 100vh;
      padding: 16px 20px;
      gap: 12px;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    .layout {
      display: flex;
      flex-direction: row;
      gap: 20px;
      flex: 1;
      min-height: 0;
      width: 100%;
    }

    .controls {
      flex: 0 0 250px;
      width: 250px;
      min-width: 250px;
      max-width: 250px;
      overflow-y: auto;
    }

    /* ── Visualizer fills ALL remaining horizontal space ── */
    #visualizer {
      flex: 1 1 0;
      min-width: 0;
      background: white;
      border: 3px solid #a78bfa;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      position: relative;
      overflow: hidden;
      min-height: 520px;
    }

    #visualizer canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 0;
      box-shadow: none;
      cursor: default;
    }

    /* ── Successor / Predecessor slider row ── */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 12px;
      color: #6b21a8;
      font-weight: 600;
    }

    .slider-row span {
      min-width: 80px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      accent-color: #7c3aed;
    }

    /* ── Stats box ── */
    .stats {
      font-size: 13px;
      line-height: 2;
      color: #4b5563;
    }

    .stats span {
      font-weight: 700;
      color: #6b21a8;
    }

    /* ── Step message ── */
    #stepMsg {
      margin-top: 10px;
      padding: 8px 10px;
      background: #ede9fe;
      border-radius: 6px;
      color: #6b21a8;
      font-size: 12px;
      font-weight: 500;
      min-height: 36px;
      text-align: center;
      line-height: 1.5;
    }

    /* ── Operation radio pills ── */
    .op-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .op-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 20px;
      border: 2px solid #ddd6fe;
      color: #6b21a8;
      background: #faf9ff;
      transition: all 0.2s;
      user-select: none;
    }

    .op-label input[type="radio"] {
      display: none;
    }

    .op-label:has(input:checked) {
      background: #7c3aed;
      border-color: #7c3aed;
      color: white;
    }

    .op-label:hover:not(:has(input:checked)) {
      border-color: #a78bfa;
      background: #ede9fe;
    }

    /* Delete options (successor/predecessor) — hidden until delete selected */
    #deleteOptions {
      display: none;
      margin-top: 10px;
    }

    #deleteOptions.visible {
      display: block;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.85);
      margin-top: 4px;
      padding: 0 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Button variants */
    #btn-insert { background: #8b5cf6; }
    #btn-insert:hover:not(:disabled) { background: #7c3aed; }

    #btn-delete { background: #ef4444; }
    #btn-delete:hover:not(:disabled) { background: #dc2626; }

    #btn-search { background: #3b82f6; }
    #btn-search:hover:not(:disabled) { background: #2563eb; }

    #btn-clear  { background: #6366f1; }
    #btn-clear:hover:not(:disabled)  { background: #4f46e5; }

    #btn-prev, #btn-next {
      background: #a78bfa;
    }
    #btn-prev:hover:not(:disabled),
    #btn-next:hover:not(:disabled) {
      background: #8b5cf6;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn-row button {
      flex: 1;
    }
  </style>
</head>

<body>

  <h2>Data Structures – Binary Search Tree</h2>

  <div class="layout">

    <!-- ── LEFT PANEL ── -->
    <div class="controls">

      <!-- Operation selector -->
      <div class="control-group">
        <h3>Operation</h3>
        <div class="op-group">
          <label class="op-label">
            <input type="radio" name="operation" value="insert" id="opInsert" checked>
            Insert
          </label>
          <label class="op-label">
            <input type="radio" name="operation" value="delete" id="opDelete">
            Delete
          </label>
          <label class="op-label">
            <input type="radio" name="operation" value="search" id="opSearch">
            Search
          </label>
        </div>

        <!-- Delete replacement strategy — shown only when Delete is active -->
        <div id="deleteOptions">
          <label style="margin-top:10px; font-size:12px;">Replacement strategy</label>
          <div class="slider-row">
            <span id="stratLabel">In-order Successor</span>
            <input type="range" id="stratSlider" min="0" max="1" value="0" step="1">
          </div>
        </div>
      </div>

      <!-- Value input + action button -->
      <div class="control-group">
        <h3>Value</h3>
        <input type="number" id="valueInput" placeholder="e.g. 42" style="width:100%;margin-bottom:10px;">
        <button id="btn-insert">▶ Insert</button>
        <button id="btn-delete" style="display:none;">✕ Delete</button>
        <button id="btn-search" style="display:none;">⌕ Search</button>
      </div>

      <!-- Step-by-step -->
      <div class="control-group">
        <h3>Visualisation</h3>
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <input type="checkbox" id="chk-step"> Step-by-step mode
        </label>
        <div class="btn-row" id="stepControls" style="display:none;">
          <button id="btn-prev" disabled>← Back</button>
          <button id="btn-next" disabled>Forward →</button>
        </div>
        <div id="stepMsg"></div>
      </div>

      <!-- Speed -->
      <div class="control-group">
        <h3>Speed</h3>
        <label>Speed: <span id="val-speed">5×</span></label>
        <input type="range" id="slider-speed" min="1" max="20" value="5" style="width:100%;accent-color:#8b5cf6;">
      </div>

      <!-- Stats -->
      <div class="control-group">
        <h3>Stats</h3>
        <div class="stats">
          Nodes: <span id="stat-nodes">0</span><br>
          Height: <span id="stat-height">—</span><br>
          Comparisons: <span id="stat-cmp">0</span><br>
          Status: <span id="stat-status">Ready</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="control-group" style="border-bottom:none;margin-bottom:0;">
        <h3>Actions</h3>
        <button id="btn-clear">⊘ Clear Tree</button>
      </div>

    </div>

    <!-- ── CANVAS ── -->
    <div id="visualizer">
      <canvas id="canvas"></canvas>
    </div>

  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#ddd6fe;border:2px solid #a78bfa;"></div>
      Idle
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#f59e0b;"></div>
      Traversing
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#22c55e;"></div>
      Inserted / Found
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#ef4444;"></div>
      Deleted
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#38bdf8;"></div>
      Successor / Predecessor
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#a855f7;"></div>
      Replaced
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
