<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exchange Sort Visualizer</title>
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="../Sort.css" />
</head>

<body>
  <h2>Exchange Sort Visualizer</h2>
  <div class="layout">
    <div class="controls">
      <div class="control-group">
        <h3>Array</h3>
        <label>Entries: <span class="range-val" id="val-n">50</span></label>
        <input type="range" id="slider-n" min="1" max="250" value="50" />
      </div>
      <div class="control-group">
        <h3>Speed</h3>
        <label>Speed: <span class="range-val" id="val-speed">10×</span></label>
        <input type="range" id="slider-speed" min="1" max="100" value="10" />
      </div>
      <div class="control-group">
        <h3>Options</h3>
        <div class="checkbox-row">
          <input type="checkbox" id="chk-stepwise" />
          <label for="chk-stepwise">Stepwise mode</label>
        </div>
      </div>

      <div class="control-group">
        <div class="btn-group">
          <button id="btn-reset">⟳ Reset</button>
          <button id="btn-shuffle">⇄ Shuffle</button>
          <button id="btn-reverse" style="background:#f97316;">↕ Reverse</button>
          <button id="btn-solve">▶ Solve</button>
          <button id="btn-prev" style="display:none;">◀ Prev Step</button>
          <button id="btn-next" style="display:none;">▶ Next Step</button>
        </div>
      </div>
      <div class="control-group">
        <h3>Stats</h3>
        <div class="stats">
          Comparisons: <span id="stat-cmp">0</span><br />
          Swaps: <span id="stat-swaps">0</span><br />
          Status: <span id="stat-status">Ready</span>
        </div>
      </div>
    </div>
    <div id="visualizer">
      <canvas id="canvas"></canvas>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="dot dot-default"></div>
      <div class="legend-text">
        <span class="legend-label">Unsorted</span>
        <span class="legend-desc">Not yet processed</span>
      </div>
    </div>
    <div class="legend-item">
      <div class="dot dot-outer"></div>
      <div class="legend-text">
        <span class="legend-label">a pointer (outer)</span>
        <span class="legend-desc">Fixed anchor for this pass</span>
      </div>
    </div>
    <div class="legend-item">
      <div class="dot dot-comparing"></div>
      <div class="legend-text">
        <span class="legend-label">b pointer (inner)</span>
        <span class="legend-desc">Currently comparing</span>
      </div>
    </div>
    <div class="legend-item">
      <div class="dot dot-minimum"></div>
      <div class="legend-text">
        <span class="legend-label">Swapping</span>
        <span class="legend-desc">Pair being swapped now</span>
      </div>
    </div>
    <div class="legend-item">
      <div class="dot dot-sorted"></div>
      <div class="legend-text">
        <span class="legend-label">Sorted</span>
        <span class="legend-desc">Final position confirmed</span>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
  <script src="../Sort.js"></script>

</body>

</html>
