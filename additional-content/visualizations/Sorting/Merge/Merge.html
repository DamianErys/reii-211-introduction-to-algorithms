<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Merge Sort Visualizer — Basic</title>
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="../Sort.css" />
</head>
<body>
  <h2>Merge Sort Visualizer</h2>
  <div class="layout">

    <!-- Sidebar -->
    <div class="controls">
      <div class="control-group">
        <h3>Array</h3>
        <label>Entries: <span class="range-val" id="val-n">50</span></label>
        <input type="range" id="slider-n" min="1" max="250" value="50" />
      </div>
      <div class="control-group">
        <h3>Speed</h3>
        <label>Speed: <span class="range-val" id="val-speed">10×</span></label>
        <input type="range" id="slider-speed" min="1" max="100" value="10" />
      </div>
      <div class="control-group">
        <h3>Options</h3>
        <div class="checkbox-row">
          <input type="checkbox" id="chk-stepwise" />
          <label for="chk-stepwise">Stepwise mode</label>
        </div>
      </div>
      <div class="control-group">
        <h3>Stats</h3>
        <div class="stats">
          Comparisons: <span id="stat-cmp">0</span><br/>
          Merges: <span id="stat-merges">0</span><br/>
          Status: <span id="stat-status">Ready</span>
        </div>
      </div>
      <div class="control-group">
        <div class="btn-group">
          <button id="btn-reset">⟳ Reset</button>
          <button id="btn-shuffle">⇄ Shuffle</button>
          <button id="btn-solve">▶ Solve</button>
          <button id="btn-prev" style="display:none;">◀ Prev Step</button>
          <button id="btn-next" style="display:none;">▶ Next Step</button>
        </div>
      </div>
    </div>

    <!-- Canvas -->
    <div id="visualizer">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="dot dot-default"></div>
      <div class="legend-text">
        <span class="legend-label">Unsorted</span>
        <span class="legend-desc">Not yet processed</span>
      </div>
    </div>
    <div class="legend-item">
      <div class="dot dot-left" style="background:#facc15;border:2px solid #a16207;"></div>
      <div class="legend-text">
        <span class="legend-label">Left pointer</span>
        <span class="legend-desc">Under comparison</span>
      </div>
    </div>
    <div class="legend-item">
      <div class="dot dot-right" style="background:#f472b6;"></div>
      <div class="legend-text">
        <span class="legend-label">Right pointer</span>
        <span class="legend-desc">Under comparison</span>
      </div>
    </div>
    <div class="legend-item">
      <div class="dot dot-merging" style="background:#fb923c;"></div>
      <div class="legend-text">
        <span class="legend-label">Merging</span>
        <span class="legend-desc">Being placed into merged run</span>
      </div>
    </div>
    <div class="legend-item">
      <div class="dot dot-sorted"></div>
      <div class="legend-text">
        <span class="legend-label">Sorted</span>
        <span class="legend-desc">Final pass confirmed</span>
      </div>
    </div>
  </div>

  <script src="merge.js"></script>
</body>
</html>
